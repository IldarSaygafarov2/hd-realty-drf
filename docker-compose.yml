services:
  hd-api:
    build: .
    container_name: hd_api_c
    env_file:
      - .env
    depends_on:
      - hd-db
    volumes:
      - ./:/app
      - media:/app/core/media
    ports:
      - "8002:8002"
    command: >
      sh -c "
        python manage.py collectstatic --no-input &&
        python manage.py makemigrations --no-input &&
        python manage.py migrate --no-input &&
        python manage.py fill_districts  &&
        python manage.py fill_categories  &&
        python manage.py fill_property_types  &&
        python manage.py fill_renovation_types  &&
        python manage.py fill_advertisements  &&
        python manage.py createsuperuser --noinput 2>/dev/null || true &&
        gunicorn --bind 0.0.0.0:8002 --workers 3 core.project.wsgi:application --reload
      "

  hd-db:
    image: postgres:16-alpine
    ports:
      - "5432:5435"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
  media:
